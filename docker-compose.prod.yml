services:
  backend:
    image: ${ECR_REGISTRY:-oncosaas}/oncosaas-backend:${IMAGE_TAG:-latest}
    container_name: backend
    restart: on-failure
    ports:
      - '127.0.0.1:3002:3002'
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: '3002'
      AI_SERVICE_URL: http://ai-service:8001
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://backend:3002/api/v1/health',function(r){process.exit(r.statusCode===200?0:1)}).on('error',function(){process.exit(1)})"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    image: ${ECR_REGISTRY:-oncosaas}/oncosaas-frontend:${IMAGE_TAG:-latest}
    container_name: frontend
    restart: on-failure
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: production

  ai-service:
    image: ${ECR_REGISTRY:-oncosaas}/oncosaas-ai-service:${IMAGE_TAG:-latest}
    container_name: ai-service
    restart: on-failure
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '127.0.0.1:8001:8001'
    env_file:
      - ./ai-service/.env
    environment:
      BACKEND_URL: http://backend:3002
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  backend_uploads:
