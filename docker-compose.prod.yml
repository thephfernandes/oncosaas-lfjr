# Production overlay — used together with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
#
# Required environment variables (set in .env on EC2 or exported before running):
#   ECR_REGISTRY  — ECR registry URL injected by the deploy workflow
#   IMAGE_TAG     — git commit SHA injected by the deploy workflow

services:
  backend:
    image: ${ECR_REGISTRY}/oncosaas-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped

  frontend:
    image: ${ECR_REGISTRY}/oncosaas-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped

  ai-service:
    image: ${ECR_REGISTRY}/oncosaas-ai-service:${IMAGE_TAG:-latest}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
