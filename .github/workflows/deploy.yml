name: Deploy

on:
  push:
    branches: [main]

# ── Recommended GitHub Variables (non-sensitive) ───────────────────────────────
# AWS_ACCOUNT_ID           12-digit AWS account ID
# AWS_REGION               e.g. us-east-1
# APP_URL                  Public URL of the app, e.g. https://yourdomain.com
#                          Used as NEXT_PUBLIC_API_URL baked into the frontend image
#                          Must be https:// and allowed by your reverse proxy/TLS config
#
# ── Required GitHub Secrets (CI/CD only) ───────────────────────────────────────
# AWS_ACCESS_KEY_ID        IAM user access key (push images to ECR)
# AWS_SECRET_ACCESS_KEY    IAM user secret key
# EC2_HOST                 Public IP or hostname of the EC2 instance
# EC2_USER                 SSH user (ec2-user for Amazon Linux, ubuntu for Ubuntu)
# EC2_SSH_KEY              PEM private key (full private key contents)
#
# ── Runtime app config/secrets (do NOT keep in GitHub) ────────────────────────
# Store on EC2 via AWS Secrets Manager / SSM Parameter Store and load at deploy/start:
# DATABASE_URL, JWT_SECRET, ENCRYPTION_KEY, NEXTAUTH_SECRET, RABBITMQ_DEFAULT_PASS
# ALLOWED_ORIGINS, CORS_ORIGINS
# See docs/producao/secret-generation.md for generation commands
# ──────────────────────────────────────────────────────────────────────────────

env:
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}
  APP_URL: ${{ vars.APP_URL || secrets.APP_URL }}
  ECR_REGISTRY: ${{ (vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID) }}.dkr.ecr.${{ (vars.AWS_REGION || secrets.AWS_REGION) }}.amazonaws.com

jobs:
  # ── 1. Build & push all three images to ECR ───────────────────────────────
  build-and-push:
    name: Build & push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    environment: production

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
          - service: ai-service
            context: ./ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Derive wss:// or ws:// from APP_URL (https → wss, http → ws)
      - name: Compute WebSocket URL
        id: ws
        run: |
          APP_URL="${{ env.APP_URL }}"
          WS_URL="${APP_URL/https:\/\//wss://}"
          WS_URL="${WS_URL/http:\/\//ws://}"
          echo "url=$WS_URL" >> "$GITHUB_OUTPUT"

      # Build args only apply to the frontend image; ignored by backend/ai-service
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.APP_URL }}
            NEXT_PUBLIC_WS_URL=${{ steps.ws.outputs.url }}
          # Layer cache scoped per service — dramatically speeds up subsequent builds
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── 2. Security scan each image with Trivy ────────────────────────────────
  scan:
    name: Scan — ${{ matrix.service }}
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend, ai-service]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan ${{ matrix.service }} for HIGH vulnerabilities (warn only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH

      - name: Scan ${{ matrix.service }} for CRITICAL vulnerabilities (fail build)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL
          skip-setup-trivy: true

  # ── 3. Deploy to EC2 ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: scan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Extract bare domain from APP_URL (e.g. https://app.example.com → app.example.com)
      # Caddy uses the domain as the site address and provisions the cert automatically
      - name: Extract domain from APP_URL
        id: domain
        run: |
          DOMAIN="${{ env.APP_URL }}"
          DOMAIN="${DOMAIN#https://}"
          DOMAIN="${DOMAIN#http://}"
          DOMAIN="${DOMAIN%/}"
          echo "value=$DOMAIN" >> "$GITHUB_OUTPUT"

      # Copy compose files to EC2
      - name: Sync compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,compose.app.yml,compose.infra.yml,docker-compose.dev.yml"
          target: ~/app
          strip_components: 0

      - name: Pull images and restart services
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: ${{ env.AWS_REGION }}
          DOMAIN: ${{ steps.domain.outputs.value }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,IMAGE_TAG,AWS_REGION,DOMAIN
          script: |
            set -e

            # Authenticate Docker on the EC2 host using its instance role/profile
            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            cd ~/app

            # Pull the three app images (infra images are pulled on demand by Compose)
            docker pull "$ECR_REGISTRY/oncosaas-backend:$IMAGE_TAG"
            docker pull "$ECR_REGISTRY/oncosaas-frontend:$IMAGE_TAG"
            docker pull "$ECR_REGISTRY/oncosaas-ai-service:$IMAGE_TAG"

            # Restart production app stack — --no-build forces Compose to use the pulled images
            # --force-recreate ensures old containers are stopped before new ones start,
            # preventing "address already in use" port binding errors
            docker compose \
              -f docker-compose.prod.yml \
              up -d --no-build --force-recreate --remove-orphans

            # Remove dangling images from previous deploys
            docker image prune -f