name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  APP_URL: ${{ vars.APP_URL }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

jobs:
  build-and-push:
    name: Build & push - ${{ matrix.service }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
          - service: ai-service
            context: ./ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute WebSocket URL
        id: ws
        run: |
          APP_URL="${{ env.APP_URL }}"
          WS_URL="${APP_URL/https:\/\//wss://}"
          WS_URL="${WS_URL/http:\/\//ws://}"
          echo "url=$WS_URL" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        if: matrix.service == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}
            ${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:latest
          secrets: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Build and push non-backend
        if: matrix.service != 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}
            ${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.APP_URL }}
            NEXT_PUBLIC_WS_URL=${{ steps.ws.outputs.url }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  scan:
    name: Scan - ${{ matrix.service }}
    needs: build-and-push
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend, ai-service]

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull ARM64 image
        run: |
          docker pull --platform linux/arm64 \
            "${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}"

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.69.3

      - name: Scan ${{ matrix.service }} for HIGH vulnerabilities (warn only)
        run: |
          trivy image \
            --platform linux/arm64 \
            --scanners vuln \
            --severity HIGH \
            --ignore-unfixed \
            --format table \
            --exit-code 0 \
            "${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}"

      - name: Scan ${{ matrix.service }} for CRITICAL vulnerabilities
        shell: bash
        run: |
          EXIT_CODE=1
          if [ "${{ matrix.service }}" = "ai-service" ]; then
            EXIT_CODE=0
          fi

          trivy image \
            --platform linux/arm64 \
            --scanners vuln \
            --severity CRITICAL \
            --ignore-unfixed \
            --format table \
            --exit-code "${EXIT_CODE}" \
            "${{ env.ECR_REGISTRY }}/oncosaas-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}"

  deploy:
    name: Deploy to EC2 via SSM
    needs: scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync docker-compose.prod.yml to EC2 via SSM
        run: |
          set -euo pipefail

          COMPOSE_B64="$(base64 < docker-compose.prod.yml | tr -d '\n')"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Sync docker-compose.prod.yml" \
            --parameters commands='[
              "set -eu pipefail",
              "APP_ROOT=/opt/oncosaas",
              "CURRENT_DIR=$APP_ROOT/current",
              "mkdir -p \"$CURRENT_DIR\"",
              "echo '"${COMPOSE_B64}"' | base64 -d > \"$CURRENT_DIR/docker-compose.prod.yml\"",
              "test -f \"$CURRENT_DIR/docker-compose.prod.yml\"",
              "ls -la \"$CURRENT_DIR\""
            ]' \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

      - name: Run deployment command on EC2
        id: ssm
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "OncoSaaS deploy ${IMAGE_TAG}" \
            --parameters commands='[
              "set -eu pipefail",
              "APP_ROOT=/opt/oncosaas",
              "CURRENT_DIR=$APP_ROOT/current",
              "ECR_REGISTRY='"${ECR_REGISTRY}"'",
              "IMAGE_TAG='"${IMAGE_TAG}"'",
              "AWS_REGION='"${AWS_REGION}"'",
              "if ! test -f \"$CURRENT_DIR/docker-compose.prod.yml\"; then echo \"Missing compose file at $CURRENT_DIR/docker-compose.prod.yml\"; ls -la \"$CURRENT_DIR\"; exit 1; fi",
              "ls -la \"$CURRENT_DIR\"",
              "aws ecr get-login-password --region \"$AWS_REGION\" | docker login --username AWS --password-stdin \"$ECR_REGISTRY\"",
              "docker pull \"$ECR_REGISTRY/oncosaas-backend:$IMAGE_TAG\"",
              "docker pull \"$ECR_REGISTRY/oncosaas-frontend:$IMAGE_TAG\"",
              "docker pull \"$ECR_REGISTRY/oncosaas-ai-service:$IMAGE_TAG\"",
              "docker tag \"$ECR_REGISTRY/oncosaas-backend:$IMAGE_TAG\" \"$ECR_REGISTRY/oncosaas-backend:latest\"",
              "docker tag \"$ECR_REGISTRY/oncosaas-frontend:$IMAGE_TAG\" \"$ECR_REGISTRY/oncosaas-frontend:latest\"",
              "docker tag \"$ECR_REGISTRY/oncosaas-ai-service:$IMAGE_TAG\" \"$ECR_REGISTRY/oncosaas-ai-service:latest\"",
              "if ! test -f \"$CURRENT_DIR/backend/.env\"; then echo \"Missing env file at $CURRENT_DIR/backend/.env\"; ls -la \"$CURRENT_DIR/backend\" || true; exit 1; fi",
              "if ! test -f \"$CURRENT_DIR/frontend/.env\"; then echo \"Missing env file at $CURRENT_DIR/frontend/.env\"; ls -la \"$CURRENT_DIR/frontend\" || true; exit 1; fi",
              "if ! test -f \"$CURRENT_DIR/ai-service/.env\"; then echo \"Missing env file at $CURRENT_DIR/ai-service/.env\"; ls -la \"$CURRENT_DIR/ai-service\" || true; exit 1; fi",
              "export ECR_REGISTRY IMAGE_TAG",
              "cd \"$CURRENT_DIR\"",
              "docker compose --project-directory \"$CURRENT_DIR\" --env-file \"$CURRENT_DIR/backend/.env\" -f docker-compose.prod.yml config >/dev/null",
              "docker compose --project-directory \"$CURRENT_DIR\" --env-file \"$CURRENT_DIR/backend/.env\" -f docker-compose.prod.yml run --rm --no-deps -T backend npx prisma migrate status",
              "docker compose --project-directory \"$CURRENT_DIR\" --env-file \"$CURRENT_DIR/backend/.env\" -f docker-compose.prod.yml run --rm --no-deps -T backend npx prisma migrate deploy",
              "docker compose --project-directory \"$CURRENT_DIR\" --env-file \"$CURRENT_DIR/backend/.env\" -f docker-compose.prod.yml up -d  --force-recreate --remove-orphans",
              "curl -fsS http://127.0.0.1:3002/api/v1/health >/dev/null",
              "curl -fsS http://127.0.0.1:8001/health >/dev/null",
              "curl -fsS http://127.0.0.1:3000 >/dev/null",
              "docker container prune -f || true",
              "docker image prune -f || true"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait and assert deployment status
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          set -uo pipefail

          WAIT_RC=0
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || WAIT_RC=$?

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'Status' \
            --output text)

          RESPONSE_CODE=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'ResponseCode' \
            --output text)

          STDOUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text)

          STDERR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'StandardErrorContent' \
            --output text)

          echo "SSM status: $STATUS"
          echo "SSM response code: $RESPONSE_CODE"
          echo ""
          echo "----- STDOUT -----"
          echo "$STDOUT"
          echo ""
          echo "----- STDERR -----"
          echo "$STDERR"

          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi
