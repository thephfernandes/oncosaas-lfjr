name: CI

on:
  push:
    branches: [main, dev, stage]
  pull_request:
    branches: [main, dev, stage]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Show Docker Compose version
        run: docker compose version

      - name: Prepare service env files
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env
          cp ai-service/.env.example ai-service/.env

      - name: Validate compose.infra.yml
        run: docker compose -f compose.infra.yml config > /tmp/compose.infra.yml

      - name: Validate compose.app.yml
        run: docker compose -f compose.app.yml config > /tmp/compose.app.yml

      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config > /tmp/docker-compose.dev.yml

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml config > /tmp/docker-compose.prod.yml

  migrations:
    needs: compose-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ONCONAV
          POSTGRES_PASSWORD: ONCONAV_dev
          POSTGRES_DB: ONCONAV_development
        options: >-
          --health-cmd "pg_isready -U ONCONAV -d ONCONAV_development"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Prepare backend env for migration validation
        run: |
          cp .env.example .env
          {
            echo "DATABASE_URL=postgresql://ONCONAV:ONCONAV_dev@localhost:5432/ONCONAV_development"
            echo "JWT_SECRET=${{ secrets.CI_JWT_SECRET || 'ci-test-jwt-secret' }}"
            echo "ENCRYPTION_KEY=${{ secrets.CI_ENCRYPTION_KEY || '12345678901234567890123456789012' }}"
            echo "REDIS_URL=redis://localhost:6379"
            echo "BACKEND_SERVICE_TOKEN=${{ secrets.CI_BACKEND_SERVICE_TOKEN || 'ci-backend-service-token' }}"
          } >> .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply migrations to fresh CI database
        run: npx prisma migrate deploy

      - name: Verify migration status
        run: npx prisma migrate status

  frontend:
    needs: compose-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Prepare frontend env (with CI overrides)
        run: |
          cp .env.example .env
          {
            echo "NEXTAUTH_URL=${{ vars.CI_NEXTAUTH_URL || 'http://localhost:3000' }}"
            echo "NEXTAUTH_SECRET=${{ secrets.CI_NEXTAUTH_SECRET || 'ci-test-nextauth-secret' }}"
            echo "NEXT_PUBLIC_API_URL=${{ vars.CI_NEXT_PUBLIC_API_URL || 'http://localhost:3002' }}"
            echo "NEXT_PUBLIC_WS_URL=${{ vars.CI_NEXT_PUBLIC_WS_URL || 'ws://localhost:3002' }}"
          } >> .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build

  backend:
    needs:
      - compose-validate
      - migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ONCONAV
          POSTGRES_PASSWORD: ONCONAV_dev
          POSTGRES_DB: ONCONAV_development
        options: >-
          --health-cmd "pg_isready -U ONCONAV -d ONCONAV_development"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Prepare backend env (with CI overrides)
        run: |
          cp .env.example .env
          {
            echo "DATABASE_URL=postgresql://ONCONAV:ONCONAV_dev@localhost:5432/ONCONAV_development"
            echo "JWT_SECRET=${{ secrets.CI_JWT_SECRET || 'ci-test-jwt-secret' }}"
            echo "ENCRYPTION_KEY=${{ secrets.CI_ENCRYPTION_KEY || '12345678901234567890123456789012' }}"
            echo "REDIS_URL=${{ vars.CI_REDIS_URL || 'redis://localhost:6379' }}"
            echo "BACKEND_SERVICE_TOKEN=${{ secrets.CI_BACKEND_SERVICE_TOKEN || 'ci-backend-service-token' }}"
          } >> .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Verify clinical protocol snapshot matches templates
        working-directory: ${{ github.workspace }}
        run: |
          cd backend && npm run export-protocol-snapshot && cd ..
          git diff --exit-code shared/clinical-protocol-snapshot.v1.json

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test (unit)
        run: npm test -- --forceExit

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build

  ai-service:
    needs: compose-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Prepare ai-service env (with CI overrides)
        run: |
          cp .env.example .env
          {
            echo "BACKEND_URL=${{ vars.CI_BACKEND_URL || 'http://localhost:3002' }}"
            echo "BACKEND_SERVICE_TOKEN=${{ secrets.CI_BACKEND_SERVICE_TOKEN || 'ci-backend-service-token' }}"
            echo "CORS_ORIGINS=${{ vars.CI_CORS_ORIGINS || 'http://localhost:3000' }}"
            echo "OPENAI_API_KEY=${{ secrets.CI_OPENAI_API_KEY || '' }}"
            echo "ANTHROPIC_API_KEY=${{ secrets.CI_ANTHROPIC_API_KEY || '' }}"
          } >> .env

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            ai-service/requirements.txt
            ai-service/requirements-dev.txt

      - name: Install dependencies and dev tooling
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v --tb=short

      - name: Security audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true

  integration:
    needs:
      - frontend
      - backend
      - ai-service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Show Docker Compose version
        run: docker compose version

      - name: Prepare service env files for integration
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env
          cp ai-service/.env.example ai-service/.env

          {
            echo "POSTGRES_USER=ONCONAV"
            echo "POSTGRES_PASSWORD=ONCONAV_dev"
            echo "POSTGRES_DB=ONCONAV_development"
            echo "DATABASE_URL=postgresql://ONCONAV:ONCONAV_dev@localhost:5432/ONCONAV_development"
            echo "RABBITMQ_DEFAULT_USER=ONCONAV"
            echo "RABBITMQ_DEFAULT_PASS=ONCONAV_dev"
            echo "JWT_SECRET=${{ secrets.CI_JWT_SECRET || 'ci-test-jwt-secret' }}"
            echo "ENCRYPTION_KEY=${{ secrets.CI_ENCRYPTION_KEY || '12345678901234567890123456789012' }}"
            echo "BACKEND_SERVICE_TOKEN=${{ secrets.CI_BACKEND_SERVICE_TOKEN || 'ci-backend-service-token' }}"
            echo "RUN_DB_SEED_ON_EMPTY=false"
          } >> backend/.env

          {
            echo "NEXTAUTH_URL=http://localhost:3000"
            echo "NEXTAUTH_SECRET=${{ secrets.CI_NEXTAUTH_SECRET || 'ci-test-nextauth-secret' }}"
            echo "NEXT_PUBLIC_API_URL=http://localhost:3002"
            echo "NEXT_PUBLIC_WS_URL=ws://localhost:3002"
          } >> frontend/.env

          {
            echo "BACKEND_SERVICE_TOKEN=${{ secrets.CI_BACKEND_SERVICE_TOKEN || 'ci-backend-service-token' }}"
            echo "CORS_ORIGINS=http://localhost:3000"
            echo "OPENAI_API_KEY=${{ secrets.CI_OPENAI_API_KEY || '' }}"
            echo "ANTHROPIC_API_KEY=${{ secrets.CI_ANTHROPIC_API_KEY || '' }}"
          } >> ai-service/.env

      - name: Build and start stack
        env:
          DATABASE_URL: postgresql://ONCONAV:ONCONAV_dev@postgres:5432/ONCONAV_development
        run: docker compose -f docker-compose.dev.yml up -d --build

      - name: Wait for healthy containers
        run: |
          wait_for_health() {
            service="$1"
            for i in $(seq 1 60); do
              status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$service" 2>/dev/null || true)"
              if [ "$status" = "healthy" ]; then
                echo "$service is healthy"
                return 0
              fi
              sleep 2
            done
            echo "$service did not become healthy in time" >&2
            docker logs "$service" || true
            return 1
          }

          wait_for_health pg-database
          wait_for_health redis-cache
          wait_for_health msg-service
          wait_for_health backend
          wait_for_health ai-service

      - name: Wait for frontend response
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then
              echo "frontend is responding"
              exit 0
            fi
            sleep 2
          done
          echo "frontend did not respond in time" >&2
          docker logs frontend || true
          exit 1

      - name: Smoke test stack
        run: |
          curl -fsS http://127.0.0.1:3000/ > /dev/null
          curl -fsS http://127.0.0.1:3002/api/v1/health > /dev/null
          curl -fsS http://127.0.0.1:8001/health > /dev/null

      - name: Show compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
