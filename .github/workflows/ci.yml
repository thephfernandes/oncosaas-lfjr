name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  
jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare service env files
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env
          cp ai-service/.env.example ai-service/.env

      - name: Validate compose.infra.yml
        run: docker compose -f compose.infra.yml config > /tmp/compose.infra.yml

      - name: Validate compose.app.yml
        run: docker compose -f compose.app.yml config > /tmp/compose.app.yml

      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config > /tmp/docker-compose.dev.yml

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml config > /tmp/docker-compose.prod.yml

  frontend:
    needs: compose-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Prepare frontend env (with CI overrides)
        run: |
          cp .env.example .env
          {
            echo "NEXTAUTH_URL=${{ vars.CI_NEXTAUTH_URL || 'http://localhost:3000' }}"
            echo "NEXTAUTH_SECRET=${{ secrets.CI_NEXTAUTH_SECRET || 'ci-test-nextauth-secret' }}"
            echo "NEXT_PUBLIC_API_URL=${{ vars.CI_NEXT_PUBLIC_API_URL || 'http://localhost:3002' }}"
            echo "NEXT_PUBLIC_WS_URL=${{ vars.CI_NEXT_PUBLIC_WS_URL || 'ws://localhost:3002' }}"
          } >> .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build

  backend:
    needs: compose-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Prepare backend env (with CI overrides)
        run: |
          cp .env.example .env
          {
            echo "DATABASE_URL=${{ vars.CI_DATABASE_URL || 'postgresql://test:test@localhost:5432/test_db' }}"
            echo "JWT_SECRET=${{ secrets.CI_JWT_SECRET || 'ci-test-jwt-secret' }}"
            echo "ENCRYPTION_KEY=${{ secrets.CI_ENCRYPTION_KEY || '12345678901234567890123456789012' }}"
            echo "REDIS_URL=${{ vars.CI_REDIS_URL || 'redis://localhost:6379' }}"
            echo "BACKEND_SERVICE_TOKEN=${{ secrets.CI_BACKEND_SERVICE_TOKEN || 'ci-backend-service-token' }}"
          } >> .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            backend/prisma/schema.prisma
            backend/prisma/migrations/**/migration.sql

      - name: Install dependencies
        run: npm ci

      - name: Cache generated Prisma client
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules/.prisma
            backend/node_modules/@prisma/client
          key: prisma-client-${{ runner.os }}-${{ hashFiles('backend/package-lock.json', 'backend/prisma/schema.prisma', 'backend/prisma/migrations/**/migration.sql') }}

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run type-check
        
      - name: Lint
        run: npm run lint

      - name: Test (unit)
        run: npm test -- --forceExit

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build

  ai-service:
    needs: compose-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Prepare ai-service env (with CI overrides)
        run: |
          cp .env.example .env
          {
            echo "BACKEND_URL=${{ vars.CI_BACKEND_URL || 'http://localhost:3002' }}"
            echo "BACKEND_SERVICE_TOKEN=${{ secrets.CI_BACKEND_SERVICE_TOKEN || 'ci-backend-service-token' }}"
            echo "CORS_ORIGINS=${{ vars.CI_CORS_ORIGINS || 'http://localhost:3000' }}"
            echo "OPENAI_API_KEY=${{ secrets.CI_OPENAI_API_KEY || '' }}"
            echo "ANTHROPIC_API_KEY=${{ secrets.CI_ANTHROPIC_API_KEY || '' }}"
          } >> .env

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio

      - name: Lint
        run: pip install ruff && ruff check .

      - name: Test
        run: pytest tests/ -v --tb=short

      - name: Security audit
        run: pip install pip-audit && pip-audit -r requirements.txt
        continue-on-error: true
