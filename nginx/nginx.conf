# Containerised nginx — routes public traffic to internal Docker services.
# Only port 80 is exposed to the internet; all app/infra ports are loopback-only.
#
# To add HTTPS:
#   1. Mount certs into the container (Let's Encrypt recommended)
#   2. Add a port 443 block below and expose 443:443 in docker-compose.prod.yml
#   3. Add `return 301 https://$host$request_uri;` to the port 80 server block

server {
    listen 80 default_server;
    server_name _;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Frontend (Next.js)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend REST API
    location /api/ {
        proxy_pass         http://backend:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend static uploads
    location /uploads/ {
        proxy_pass         http://backend:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # WebSocket (Socket.io)
    location /socket.io/ {
        proxy_pass         http://backend:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }
}
