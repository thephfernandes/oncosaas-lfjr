services:
  postgres:
    image: postgres:15-alpine
    container_name: pg-database
    env_file:
      - ./backend/.env
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ONCONAV -d ONCONAV_development']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: msg-service
    env_file:
      - ./backend/.env
    ports:
      - '127.0.0.1:5672:5672'
      - '127.0.0.1:15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: backend
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - '127.0.0.1:3002:3002'
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: '3002'
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://ONCONAV:ONCONAV_dev@rabbitmq:5672
      AI_SERVICE_URL: http://ai-service:8001
    volumes:
      - backend_uploads:/app/uploads
    command: npm run start:dev
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://backend:3002/api/v1/health',function(r){process.exit(r.statusCode===200?0:1)}).on('error',function(){process.exit(1)})"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    develop:
      watch:
        - path: ./backend/src
          action: sync
          target: /app/src
          initial_sync: true
        - path: ./backend/prisma
          action: sync
          target: /app/prisma
          initial_sync: true
        - path: ./backend/package.json
          action: rebuild
        - path: ./backend/package-lock.json
          action: rebuild
        - path: ./backend/tsconfig.json
          action: rebuild
        - path: ./backend/nest-cli.json
          action: rebuild

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: frontend
    restart: on-failure
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
    command: npm run dev
    develop:
      watch:
        - path: ./frontend/src
          action: sync
          target: /app/src
          initial_sync: true
        - path: ./frontend/public
          action: sync
          target: /app/public
          initial_sync: true
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/package-lock.json
          action: rebuild
        - path: ./frontend/next.config.js
          action: rebuild
        - path: ./frontend/tsconfig.json
          action: rebuild

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    restart: on-failure
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '127.0.0.1:8001:8001'
    env_file:
      - ./ai-service/.env
    environment:
      BACKEND_URL: http://backend:3002
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    develop:
      watch:
        - path: ./ai-service/main.py
          action: sync
          target: /app/main.py
          initial_sync: true
        - path: ./ai-service/src
          action: sync
          target: /app/src
          initial_sync: true
        - path: ./ai-service/requirements.txt
          action: rebuild
        - path: ./ai-service/requirements-dev.txt
          action: rebuild

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  backend_uploads:
