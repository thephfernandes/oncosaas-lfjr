services:
  postgres:
    image: postgres:15-alpine
    container_name: pg-database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ONCONAV}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ONCONAV_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ONCONAV_development}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ONCONAV} -d ${POSTGRES_DB:-ONCONAV_development}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: msg-service
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ONCONAV}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-ONCONAV_dev}
    ports:
      - '127.0.0.1:5672:5672'
      - '127.0.0.1:15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${ECR_REGISTRY:-oncosaas}/oncosaas-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - '127.0.0.1:3002:3002'
    environment:
      NODE_ENV: production
      PORT: '3002'
      # Override connection strings with Docker service names
      DATABASE_URL: postgresql://${POSTGRES_USER:-ONCONAV}:${POSTGRES_PASSWORD:-ONCONAV_dev}@postgres:5432/${POSTGRES_DB:-ONCONAV_development}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-ONCONAV}:${RABBITMQ_DEFAULT_PASS:-ONCONAV_dev}@rabbitmq:5672
      # Required in production — no defaults; service will fail to start if unset
      JWT_SECRET: jwtSecretKey1234567890123456
      ENCRYPTION_KEY: devEncryptionKey1234567890123456
      FRONTEND_URL: http://frontend:3000
      AI_SERVICE_URL: http://ai-service:8001
      ALLOWED_ORIGINS: http://onconav.com.br
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://backend:3002/api/v1/health',function(r){process.exit(r.statusCode===200?0:1)}).on('error',function(){process.exit(1)})"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    image: ${ECR_REGISTRY:-oncosaas}/oncosaas-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: on-failure
    depends_on:
      - backend
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://frontend:3000
      # Required in production — no defaults; service will fail to start if unset
      NEXTAUTH_SECRET: NextAuthSecret1234567890123456
      NEXT_PUBLIC_API_URL: http://backend:3002
      NEXT_PUBLIC_WS_URL: ws://backend:3002

  ai-service:
    image: ${ECR_REGISTRY:-oncosaas}/oncosaas-ai-service:${IMAGE_TAG:-latest}
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    restart: on-failure
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '127.0.0.1:8001:8001'
    environment:
      BACKEND_URL: http://backend:3002
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002}
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  backend_uploads: